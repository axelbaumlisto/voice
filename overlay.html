<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlay</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: transparent;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      /* Center the pill inside whatever OS window we got. Some Linux
       * compositors ignore inner_size hints for transparent borderless
       * windows and force a minimum (~200x200); this keeps the visual
       * coherent: the pink icon stays centered, the rest is transparent. */
      #root {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/overlay.tsx"></script>
  </body>
</html>
